<!DOCTYPE html>
<html lang="zh-CN" data-studio-scale="off">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <title>项目工作台</title>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/js/tailwindcss-cdn.js?v=2027.01.1.1.1783154657"></script>
    <script src="/static/vendor/js/lucide.js?v=2027.01.1.1.1783154657"></script>
    <script src="/static/js/theme.js?v=2027.01.1.1.1783663211"></script>
    <script src="/static/js/touch-mouse.js?v=2027.01.1.1.1783154648"></script>
    <script src="/static/js/i18n.js?v=2027.01.1.1.1783387674"></script>
    <link rel="stylesheet" href="/static/css/canvas-list.css?v=2027.01.1.1.1783961833">
    <link rel="stylesheet" href="/static/css/theme.css?v=2027.01.1.1.1783674343">
</head>
<body>
    <div id="workspace" class="workspace">
        <!-- LEFT: project sidebar -->
        <aside id="sidebar" class="ws-sidebar">
            <div class="ws-side-head">
                <div class="ws-side-title">项目</div>
                <button id="newProjectBtn" class="ws-side-add" type="button" title="新建项目" aria-label="新建项目">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                </button>
            </div>
            <div id="newProjectRow" class="ws-newproj-row">
                <input id="newProjectInput" class="ws-newproj-input" type="text" maxlength="60" placeholder="项目名称">
                <button id="newProjectConfirm" class="ws-mini-btn primary" type="button" title="确定" aria-label="确定"><i data-lucide="check" class="w-3.5 h-3.5"></i></button>
                <button id="newProjectCancel" class="ws-mini-btn" type="button" title="取消" aria-label="取消"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
            </div>
            <div id="projectList" class="ws-project-list"></div>
            <div class="ws-side-foot">
                <button id="trashEntry" class="ws-trash-entry" type="button">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                    <span class="ws-trash-label">回收站</span>
                    <span id="trashBadge" class="ws-trash-badge">0</span>
                </button>
            </div>
        </aside>

        <!-- RIGHT: board -->
        <main class="ws-main">
            <div class="ws-topbar">
                <div class="ws-topbar-left">
                    <div id="boardProjectName" class="ws-board-name">默认项目</div>
                    <span id="boardCanvasCount" class="ws-board-count">0</span>
                </div>
                <div class="ws-topbar-right">
                    <button id="pasteCanvasBtn" class="ws-paste-btn" type="button" title="粘贴到此项目" style="display:none"><i data-lucide="clipboard-paste" class="w-4 h-4"></i><span>粘贴到此项目</span></button>
                    <button id="storageManagerBtn" class="ws-icon-btn" type="button" title="存储管理" aria-label="存储管理"><i data-lucide="hard-drive" class="w-4 h-4"></i></button>
                    <button id="boardResetView" class="ws-icon-btn" type="button" title="重置视图" aria-label="重置视图"><i data-lucide="locate-fixed" class="w-4 h-4"></i></button>
                    <button id="boardRefresh" class="ws-icon-btn" type="button" title="刷新" aria-label="刷新"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                    <button id="newCanvasBtn" class="ws-primary-btn" type="button"><i data-lucide="plus" class="w-4 h-4"></i><span>新建画布</span></button>
                </div>
            </div>

            <!-- Board (pan/zoom) -->
            <div id="board" class="ws-board">
                <div id="boardWorld" class="ws-board-world"></div>
                <div id="boardEmptyHint" class="ws-board-empty">
                    <div class="ws-board-empty-icon"><i data-lucide="mouse-pointer-click" class="w-7 h-7"></i></div>
                    <div class="ws-board-empty-text">暂无画布</div>
                    <div class="ws-board-empty-sub">为当前项目创建第一块画布</div>
                    <div class="ws-board-empty-actions">
                        <button id="emptyCreateCanvasBtn" class="ws-primary-btn" type="button"><i data-lucide="plus" class="w-4 h-4"></i><span>新建画布</span></button>
                    </div>
                </div>
            </div>

            <!-- Trash panel (overlay over the board area) -->
            <div id="trashPanel" class="ws-trash-panel">
                <div class="ws-trash-head">
                    <div class="ws-trash-head-title"><i data-lucide="trash-2" class="w-4 h-4"></i><span>回收站</span></div>
                    <button id="trashClose" class="ws-icon-btn" type="button" title="关闭" aria-label="关闭"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div class="ws-trash-note"><i data-lucide="info" class="w-3.5 h-3.5"></i><span>回收站中的画布会在 30 天后自动清理。</span></div>
                <div id="trashList" class="ws-trash-list"></div>
            </div>

            <div id="boardStatus" class="ws-status"></div>
        </main>
    </div>
    <div id="storageModal" class="storage-modal" aria-hidden="true">
        <div class="storage-backdrop" data-storage-close></div>
        <section class="storage-dialog" role="dialog" aria-modal="true" aria-labelledby="storageTitle">
            <header class="storage-head"><div><h2 id="storageTitle">存储管理</h2><p>查看当前未发现任何画布或素材库引用的媒体</p></div><button class="ws-icon-btn" type="button" data-storage-close title="关闭"><i data-lucide="x" class="w-4 h-4"></i></button></header>
            <nav class="storage-tabs"><button class="active" data-storage-tab="candidates">未引用媒体</button><button data-storage-tab="cache">预览缓存</button><button data-storage-tab="trash">媒体回收站</button></nav>
            <div id="storageCandidatesPane" class="storage-pane active">
                <div id="storageWarning" class="storage-warning" hidden></div>
                <div class="storage-summary"><div><strong id="storageCandidateCount">--</strong><span>候选文件</span></div><div><strong id="storageCandidateSize">--</strong><span>可管理空间</span></div><div><strong id="storageProtectedCount">--</strong><span>受保护文件</span></div><button id="storageRescanBtn" class="storage-secondary" type="button"><i data-lucide="scan-search"></i>重新扫描</button></div>
                <div class="storage-tools"><input id="storageSearch" type="search" placeholder="搜索文件名"><select id="storageKindFilter"><option value="all">全部类型</option><option value="image">图片</option><option value="video">视频</option><option value="audio">音频</option></select><select id="storageSourceFilter"><option value="all">全部来源</option><option value="output">生成结果</option><option value="input">输入副本</option></select><label><input id="storageShowRecent" type="checkbox"> 显示最近 7 天</label><select id="storageSort"><option value="newest">时间：新到旧</option><option value="oldest">时间：旧到新</option><option value="largest">大小：大到小</option></select></div>
                <div class="storage-selectbar"><label><input id="storageSelectVisible" type="checkbox"> 选择当前结果</label><span id="storageSelectedSummary">未选择文件</span></div>
                <div id="storageMediaGrid" class="storage-grid"></div>
                <footer class="storage-actions"><button class="storage-secondary" type="button" data-storage-close>取消</button><button id="storageTrashSelected" class="storage-danger" type="button" disabled><i data-lucide="trash-2"></i>移入媒体回收站</button></footer>
            </div>
            <div id="storageCachePane" class="storage-pane"><div class="storage-cache-card"><i data-lucide="images"></i><div><strong id="storageCacheSize">--</strong><span id="storageCacheCount">正在统计预览缓存…</span><p>预览缓存可以安全重新生成。清空不会删除任何原始图片或视频。</p></div><button id="storageClearCache" class="storage-danger" type="button">清空预览缓存</button></div></div>
            <div id="storageTrashPane" class="storage-pane"><div id="storageTrashGrid" class="storage-grid"></div><footer class="storage-actions"><span id="storageTrashSelectedSummary">未选择文件</span><button id="storageRestoreSelected" class="storage-secondary" type="button" disabled>恢复所选</button><button id="storagePurgeSelected" class="storage-danger" type="button" disabled>永久删除所选</button></footer></div>
        </section>
    </div>
    <div id="storagePreview" class="storage-preview" aria-hidden="true">
        <div class="storage-preview-backdrop" data-storage-preview-close></div>
        <section class="storage-preview-dialog" role="dialog" aria-modal="true" aria-labelledby="storagePreviewTitle">
            <header><strong id="storagePreviewTitle">媒体预览</strong><button class="ws-icon-btn" type="button" data-storage-preview-close title="关闭预览"><i data-lucide="x"></i></button></header>
            <div id="storagePreviewBody" class="storage-preview-body"></div>
        </section>
    </div>
    <script src="/static/js/canvas-list.js?v=2027.01.1.1.1783961835"></script>
</body>
</html>
